<!-- @dsCard group="Colors" viewport="700x180" name="Taupe & Sage — Secondary / Accent" subtitle="Deep clay taupe for support, botanical sage as the single accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; display: flex; gap: 28px; }
  .col { flex: 1; }
  .label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .3em; color: var(--text-secondary); margin: 0 0 10px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); box-shadow: var(--shadow-neu-sm); }
  .name { font-size: 10px; font-weight: 700; color: var(--text-primary); margin-top: 7px; }
  .hex { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="col">
    <p class="label">Taupe · Secondary</p>
    <div class="row">
      <div class="sw"><div class="chip" style="background: var(--taupe-300);"></div><div class="name">300</div><div class="hex">#A8978A</div></div>
      <div class="sw"><div class="chip" style="background: var(--taupe-400);"></div><div class="name">400</div><div class="hex">#88766A</div></div>
      <div class="sw"><div class="chip" style="background: var(--taupe-500);"></div><div class="name">500</div><div class="hex">#6D5D50</div></div>
      <div class="sw"><div class="chip" style="background: var(--taupe-600);"></div><div class="name">600</div><div class="hex">#574A3F</div></div>
    </div>
  </div>
  <div class="col">
    <p class="label">Sage · Accent</p>
    <div class="row">
      <div class="sw"><div class="chip" style="background: var(--sage-200);"></div><div class="name">200</div><div class="hex">#C9D2B3</div></div>
      <div class="sw"><div class="chip" style="background: var(--sage-300);"></div><div class="name">300</div><div class="hex">#AEBB8C</div></div>
      <div class="sw"><div class="chip" style="background: var(--sage-500);"></div><div class="name">500</div><div class="hex">#8A9A5B</div></div>
      <div class="sw"><div class="chip" style="background: var(--sage-600);"></div><div class="name">600</div><div class="hex">#6F7C49</div></div>
    </div>
  </div>
</body>
</html>
