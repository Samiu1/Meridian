<!-- @dsCard group="Type" viewport="700x180" name="Eyebrow Labels & Mono" subtitle="Ultra-wide uppercase Raleway 900 eyebrows; Fira Code for data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 30px 32px; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .eb-lg { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: .4em; color: var(--text-primary); }
  .eb-md { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .3em; color: var(--text-secondary); }
  .eb-sm { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: .2em; color: var(--text-muted); }
  .mono { font-family: var(--font-mono); font-size: 13px; color: var(--text-primary); letter-spacing: .02em; }
  .cap { font-size: 9px; font-weight: 900; letter-spacing: .25em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="stack">
    <div><div class="eb-lg">Composite Index</div></div>
    <div><div class="eb-md">Multi-Agent Counsel</div></div>
    <div><div class="eb-sm">Stability Index</div></div>
    <div><span class="mono">58 BPM&nbsp;&nbsp;·&nbsp;&nbsp;HRV 64ms&nbsp;&nbsp;·&nbsp;&nbsp;94 / 100</span><div class="cap">Fira Code · numeric data</div></div>
  </div>
</body>
</html>
