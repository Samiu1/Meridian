<!-- @dsCard group="Colors" viewport="700x190" name="Clay / Copper — Primary" subtitle="The signature warm copper, used for primary accents & the wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-neu-sm); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px 10px; background: var(--surface-base); }
  .name { font-size: 11px; font-weight: var(--weight-bold); color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  .lead { margin-bottom: 16px; }
</style>
</head>
<body>
  <div class="row lead">
    <div class="sw" style="flex: 2.2;">
      <div class="chip" style="height: 84px; background: var(--clay-500);"></div>
      <div class="meta"><div class="name">Primary · Clay 500</div><div class="hex">#B89076</div></div>
    </div>
  </div>
  <div class="row">
    <div class="sw"><div class="chip" style="background: var(--clay-100);"></div><div class="meta"><div class="name">100</div><div class="hex">#EFE2D8</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--clay-200);"></div><div class="meta"><div class="name">200</div><div class="hex">#E0C9B9</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--clay-300);"></div><div class="meta"><div class="name">300</div><div class="hex">#CFA98F</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--clay-500);"></div><div class="meta"><div class="name">500</div><div class="hex">#B89076</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--clay-600);"></div><div class="meta"><div class="name">600</div><div class="hex">#A37A60</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--clay-700);"></div><div class="meta"><div class="name">700</div><div class="hex">#87624B</div></div></div>
  </div>
</body>
</html>
