<!-- @dsCard group="Type" viewport="700x200" name="Lora — Display & Hero Numerals" subtitle="Serif headings, often italic; the big italic numeral is a signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 32px; display: flex; align-items: center; gap: 36px; }
  .num { font-family: var(--font-serif); font-weight: 700; font-style: italic; font-size: 110px; line-height: .9; letter-spacing: var(--tracking-tighter); color: var(--text-primary); }
  .stack > div { font-family: var(--font-serif); color: var(--text-primary); line-height: 1.15; }
  .h1 { font-size: 40px; font-weight: 700; font-style: italic; }
  .h2 { font-size: 30px; font-weight: 600; }
  .h3 { font-size: 22px; font-weight: 500; font-style: italic; color: var(--text-secondary); }
  .cap { font-size: 9px; font-weight: 900; letter-spacing: .3em; text-transform: uppercase; color: var(--text-muted); font-family: var(--font-sans); margin-top: 4px; }
</style>
</head>
<body>
  <div>
    <div class="num">94</div>
    <div class="cap">Lora 700 Italic · 80–110px</div>
  </div>
  <div class="stack">
    <div class="h1">Synthesis Report</div>
    <div class="h2">Recovery Symphony</div>
    <div class="h3">Charge versus drain</div>
    <div class="cap">Lora · 22 / 30 / 40px</div>
  </div>
</body>
</html>
