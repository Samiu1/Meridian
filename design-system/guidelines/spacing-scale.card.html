<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid; Japandi leans on the larger steps for breathing room" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; font-family: var(--font-sans); display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--clay-500); border-radius: 4px; width: 100%; }
  .box { display: flex; align-items: flex-end; height: 64px; }
  .name { font-size: 10px; font-weight: 700; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-1);"></div></div><div class="name">1</div><div class="val">4px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-2);"></div></div><div class="name">2</div><div class="val">8px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-3);"></div></div><div class="name">3</div><div class="val">12px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-4);"></div></div><div class="name">4</div><div class="val">16px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-5);"></div></div><div class="name">5</div><div class="val">24px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-6);"></div></div><div class="name">6</div><div class="val">32px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-7);"></div></div><div class="name">7</div><div class="val">40px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-8);"></div></div><div class="name">8</div><div class="val">48px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height: var(--space-10);"></div></div><div class="name">10</div><div class="val">64px</div></div>
</body>
</html>
