<!-- @dsCard group="Components" viewport="700x620" name="Data — Score, Metrics, Experts" subtitle="ScoreRing, MetricTile and ExpertCard built from real dashboard data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 32px 34px; font-family: var(--font-sans); }
  i[data-lucide] { width: 100%; height: 100%; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { ScoreRing, MetricTile, ExpertCard } = window.HealthSignalDesignSystem_f0a9a2;
    const I = (n) => <i data-lucide={n}></i>;

    function Demo() {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>
          <div style={{ display: "flex", gap: 28, alignItems: "center" }}>
            <ScoreRing value={94} label="Points" size={220} />
            <div style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <MetricTile label="Heart Rate" value={58} unit="BPM" icon={I("heart")} iconColor="var(--status-danger)" progress={70} />
              <MetricTile label="Sleep" value={88} unit="Pts" icon={I("moon")} iconColor="var(--color-secondary)" progress={88} />
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
            <ExpertCard
              name="Cardio Guardian" icon={I("activity")} accent="var(--color-primary)"
              analysis="HRV shows high parasympathetic activity. Your system is primed for high-intensity exertion."
              recommendations={["Vigorous workout recommended", "Focus on explosive power today"]}
            />
            <ExpertCard
              name="Sleep Navigator" icon={I("moon")} accent="var(--color-secondary)"
              analysis="Deep sleep was 2.5h — 40% above your 30-day average, indicating superior physical repair."
              recommendations={["Maintain 10 PM wind-down", "Continue magnesium before bed"]}
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
    setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
  </script>
</body>
</html>
